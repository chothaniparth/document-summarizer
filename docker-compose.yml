version: "3.9"

services:
  # Your project
  # app:
  #   build: .
  #   volumes:
  #     - .:/app
  #   ports:
  #     - "8501:8501" # Streamlit
  #     - "8000:8000" # API
  #   depends_on:
  #     - mongo
  #     - valkey
  #     - vector-db
  #   command: bash start_app.sh

  # Vector DB
  vector-db:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage

  # Redis (Valkey)
  valkey:
    image: valkey/valkey
    ports:
      - "6379:6379"

  # MongoDB
  mongo:
    image: mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
  qdrant_storage:
