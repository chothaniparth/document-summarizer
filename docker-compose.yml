version: "3.9"

services:
  # Streamlit App
  app:
    build: .
    volumes:
      - .:/app
    ports:
      - "8501:8501"
    depends_on:
      - vector-db
    command: streamlit run streamlit_app.py

  # Vector DB (Qdrant)
  vector-db:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage

volumes:
  qdrant_storage:
